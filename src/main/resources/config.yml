# RayTrace Anti Entity ESP - Configuration File

# Used internally to detect outdated config files after a plugin update.
# Do not edit this manually - if it's missing or doesn't match the plugin jar's
# version, your config.yml will be automatically rebuilt on next start/reload
# (your existing values are carried over; the old file is backed up first).
config_version: 4

#-----------------------------------------------
# CHECKING
#-----------------------------------------------
checking:
  # Enable or disable the raytrace ESP checking entirely
  enabled: true

  # How often to run the check loop (in ticks, 1 tick = 50ms)
  # With stagger_groups > 1, keep this at 1 for smoothest CPU distribution
  # Recommended: 1
  period_ticks: 1

  # Divide entities into N groups and only check 1 group per tick
  # stagger_groups: 1 = all entities checked every tick
  # Recommended: 2-4
  stagger_groups: 3

  # Entities within this distance (in blocks) are always shown regardless of walls
  # Set to 0 to disable
  distance_override: 10

  # Expands the entity bounding box by this value for more lenient detection
  # Set to 0 to disable
  bounding_box_extra_value: 0

  # Number of vertex layers to check per entity (minimum 2)
  # Higher = more accurate but more CPU usage
  # Recommended: 3-7
  vertices_layers: 4

#-----------------------------------------------
# PERSPECTIVE CHECKING
#-----------------------------------------------
perspective_checking:
  # Also check from third-person camera positions
  # Prevents entities showing when player is in third-person view
  enabled: true

  # Distance from head to simulate third-person camera (in blocks)
  distances_from_head: 4

#-----------------------------------------------
# DISPLAY NAME
#-----------------------------------------------
display_name:
  # Show a fake name tag above hidden entities so players can still identify them
  enabled: true

  # How many ticks ahead to extrapolate the fake nametag's position, based on the
  # hidden entity's recent velocity. Vanilla clients smooth incoming position updates
  # for non-locally-controlled entities (this includes the armor stand used for the
  # nametag) over a fixed window of a few ticks. Without compensation, a fast-moving
  # hidden entity's nametag visibly trails behind it. Raise this if the tag still lags
  # during very fast movement (elytra, speed effects); lower/zero it if the tag starts
  # overshooting or jittering on sudden stops/turns. 0 disables extrapolation entirely.
  lookahead_ticks: 3

  # Vertical offset of the name tag above the entity's head (in blocks)
  # Set to 0 for default height, negative to lower, positive to raise
  offset_y: 0

#-----------------------------------------------
# DEBUG
#-----------------------------------------------
debug:
  # Show debug block displays at entity vertices and raytrace lines
  # Only use this for testing, disable in production
  enabled: false

#-----------------------------------------------
# ANTI ENTITIES
#-----------------------------------------------
# List of entity types to apply ESP checking to
# Use entity type names from: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/entity/EntityType.html
anti_entities:
  - player

# Whether anti_entities list acts as a whitelist or blacklist
# whitelist: only check entities in the list
# blacklist: check all entities EXCEPT those in the list
anti_mode: whitelist

#-----------------------------------------------
# BLACKLISTED WORLD
#-----------------------------------------------
# Worlds where ESP checking never runs, by the viewing player's current
# world (as shown by /rtaee blacklisted_world). Leave empty to run in
# every world.
blacklisted_world: [ ]