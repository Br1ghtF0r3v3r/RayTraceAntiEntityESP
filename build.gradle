import proguard.gradle.ProGuardTask

buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath "com.guardsquare:proguard-gradle:7.9.1"
    }
}

plugins {
    id "java"
    id "com.gradleup.shadow" version "9.3.0"
    id "xyz.jpenilla.run-paper" version "3.0.2"
    id "io.papermc.paperweight.userdev" version "2.0.0-beta.21"
}

tasks {
    shadowJar {
        archiveBaseName.set("${project.name}-unof")
        archiveClassifier.set("")
        archiveVersion.set("")
        mergeServiceFiles()
    }
    tasks.jar {
        enabled = false
    }
    runServer {
        serverJar(file("run/server.jar"))
        minecraftVersion("")
        systemProperty("com.mojang.eula.agree", true)
    }
}

allprojects {
    repositories {
        mavenCentral()
        gradlePluginPortal()
        maven{url "https://repo.papermc.io/repository/maven-public/"}
        maven{url "https://repo.extendedclip.com/releases/"}
        maven{url "https://maven.respark.dev/releases"}
    }
}

dependencies {
    compileOnly "io.papermc.paper:paper-api:1.21.11-R0.1-SNAPSHOT"
    compileOnly "me.clip:placeholderapi:2.12.2"
    paperweight.paperDevBundle "1.21.11-R0.1-SNAPSHOT"
}

java {
    sourceCompatibility = JavaVersion.toVersion(javaVersion)
    targetCompatibility = JavaVersion.toVersion(javaVersion)

    if (JavaVersion.current() < JavaVersion.toVersion(javaVersion)) {
        toolchain.languageVersion = JavaLanguageVersion.of(javaVersion as String)
    }
}

def javaVersion = javaVersion as int

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'

    if (javaVersion as int >= 10 || JavaVersion.current().isJava10Compatible()) {
        options.release = javaVersion as int
    }
}

processResources {
    def props = [
            name : project.name,
            version : project.version,
            main : main,
            apiVersion : apiVersion,
            author : author,
            description : project.description,
    ]
    inputs.properties props
    filesMatching('plugin.yml') { expand props }
    filesMatching('build.properties') { expand props }
    filteringCharset 'UTF-8'
}
